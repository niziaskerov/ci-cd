name: Frontend to S3 (Reusable)

on:
  workflow_call:
    inputs:
      aws_region:
        type: string
        required: false
        default: eu-central-1

      s3_bucket:
        type: string
        required: true

      vite_api_url:
        type: string
        required: false

      next_public_api_url:
        type: string
        required: false

      node_version:
        type: string
        required: false
        default: "20"

    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      S3_BUCKET: ${{ inputs.s3_bucket }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ inputs.vite_api_url }}
          NEXT_PUBLIC_API_URL: ${{ inputs.next_public_api_url }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Configure AWS credentials (Assume Role via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Ensure S3 bucket exists
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "Bucket exists: $S3_BUCKET"
          else
            echo "Creating bucket: $S3_BUCKET in $AWS_REGION"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$S3_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$S3_BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${S3_BUCKET}/" --delete
