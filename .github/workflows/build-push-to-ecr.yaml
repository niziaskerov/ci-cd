name: Build and Push to ECR (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string

      aws_region:
        required: false
        type: string
        default: eu-central-1

      ecr_namespace:
        required: false
        type: string
        default: sabahhub

      dockerfile:
        required: false
        type: string
        default: ./Dockerfile

      context:
        required: false
        type: string
        default: .

      NEXT_PUBLIC_API_URL:
        required: false
        type: string

      build_args:
        description: "Docker build arguments, one KEY=VALUE per line"
        required: false
        type: string
        default: ""

      custom_ecr_repo:
        description: "Optional ECR repo path provided by caller repo"
        required: false
        type: string
        default: ""

    secrets:
      role_to_assume:
        required: true

    outputs:
      service_name:
        description: "Service name passed by caller"
        value: ${{ jobs.build-and-push.outputs.service_name }}
      environment:
        description: "Derived environment"
        value: ${{ jobs.build-and-push.outputs.environment }}
      image_tag:
        description: "Image tag"
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      ecr_repository:
        description: "ECR repository path"
        value: ${{ jobs.build-and-push.outputs.ecr_repository }}
      registry:
        description: "ECR registry"
        value: ${{ jobs.build-and-push.outputs.registry }}
      image_ref_sha:
        description: "Full image reference with SHA tag"
        value: ${{ jobs.build-and-push.outputs.image_ref_sha }}
      image_ref_latest:
        description: "Full image reference with latest tag"
        value: ${{ jobs.build-and-push.outputs.image_ref_latest }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: common-runner

    environment: ${{ (github.ref_name == 'main' || github.ref_name == 'eks') && 'prod' || 'dev' }}

    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ENVIRONMENT: ${{ (github.ref_name == 'main' || github.ref_name == 'eks') && 'prod' || 'dev' }}
      IMAGE_TAG: ${{ github.sha }}

    outputs:
      service_name: ${{ steps.meta.outputs.service_name }}
      environment: ${{ steps.meta.outputs.environment }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_repository: ${{ steps.meta.outputs.ecr_repository }}
      registry: ${{ steps.meta.outputs.registry }}
      image_ref_sha: ${{ steps.meta.outputs.image_ref_sha }}
      image_ref_latest: ${{ steps.meta.outputs.image_ref_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail

          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already installed"
            aws --version
            exit 0
          fi

          echo "Installing AWS CLI..."

          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y curl unzip

          ARCH="$(uname -m)"
          if [ "$ARCH" = "x86_64" ]; then
            AWSCLI_URL="https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            AWSCLI_URL="https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          curl "$AWSCLI_URL" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          $SUDO ./aws/install --update

          aws --version

      - name: Configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Determine ECR repository
        id: ecr_repo
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.custom_ecr_repo }}" ]; then
            echo "Using custom ECR repo from caller repo: ${{ inputs.custom_ecr_repo }}"
            ECR_REPO="${{ inputs.custom_ecr_repo }}"
          else
            ECR_REPO="${{ inputs.ecr_namespace }}/${{ env.ENVIRONMENT }}/${{ inputs.service_name }}"
            echo "Using default ECR repo: $ECR_REPO"
          fi

          echo "ecr_repository=$ECR_REPO" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          echo "Environment: ${ENVIRONMENT}"
          echo "ECR repo: ${{ steps.ecr_repo.outputs.ecr_repository }}"

          if ! aws ecr describe-repositories \
            --repository-names "${{ steps.ecr_repo.outputs.ecr_repository }}" \
            --region "${AWS_REGION}" > /dev/null 2>&1; then

            echo "Creating ${{ steps.ecr_repo.outputs.ecr_repository }}"

            aws ecr create-repository \
              --repository-name "${{ steps.ecr_repo.outputs.ecr_repository }}" \
              --region "${AWS_REGION}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
          else
            echo "Repository already exists"
          fi

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ inputs.context }}
          dockerfile: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build_args }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.ecr_repo.outputs.ecr_repository }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/${{ steps.ecr_repo.outputs.ecr_repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export outputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY="${{ steps.ecr.outputs.registry }}"
          ECR_REPO="${{ steps.ecr_repo.outputs.ecr_repository }}"
          TAG="${IMAGE_TAG}"
          ENVN="${ENVIRONMENT}"
          SVC="${{ inputs.service_name }}"

          echo "service_name=${SVC}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVN}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ecr_repository=${ECR_REPO}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_ref_sha=${REGISTRY}/${ECR_REPO}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref_latest=${REGISTRY}/${ECR_REPO}:latest" >> "$GITHUB_OUTPUT"
