name: Update ArgoCD Helm Values Tags (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service folder name under services/<service_name>"
        required: true
        type: string

      image_tag:
        description: "Image tag (commit SHA) from build workflow"
        required: true
        type: string

      argocd_repo:
        description: "GitOps repo, e.g. org/argocd-config"
        required: false
        type: string
        default: niziaskerov/argocd

      argocd_branch:
        description: "Branch to push into GitOps repo"
        required: false
        type: string
        default: main

    secrets:
      ARGOCD_REPO_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    environment: ${{ (github.ref_name == 'main' || github.ref_name == 'eks') && 'prod' || 'dev' }}

    env:
      ENVIRONMENT: ${{ (github.ref_name == 'main' || github.ref_name == 'eks') && 'prod' || 'dev' }}

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.argocd_repo }}
          ref: ${{ inputs.argocd_branch }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: gitops

      - name: Install yq
        run: |
          set -euo pipefail
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update values file (dev/prod based on branch)
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ "$ENVIRONMENT" = "prod" ]; then
            VALUES_FILE="services/${SERVICE}/values-prod.yaml"
          else
            VALUES_FILE="services/${SERVICE}/values-dev.yaml"
          fi

          FULL_PATH="gitops/${VALUES_FILE}"

          if [ ! -f "$FULL_PATH" ]; then
            echo "ERROR: File not found -> $FULL_PATH"
            echo "Available files under services/${SERVICE}:"
            ls -la "gitops/services/${SERVICE}" || true
            exit 1
          fi

          # --- FRONTEND CHECK BASED ON CALLER REPO NAME ---
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          if [[ "$REPO_NAME" == *"frontend"* ]]; then
            if yq -e '.frontend and .frontend.image' "$FULL_PATH" > /dev/null; then
              echo "Caller repo name contains 'frontend', updating frontend.image.tag"
              yq -i '(.frontend.image.tag) = strenv(IMAGE_TAG)' "$FULL_PATH"
              echo "Updated frontend.image.tag:"
              yq -r '.frontend.image.tag' "$FULL_PATH"
              echo "Exiting workflow after frontend tag update."
              exit 0
            else
              echo "WARNING: .frontend.image not found in $FULL_PATH, skipping frontend tag update"
              exit 1
            fi
          fi

          # --- EXISTING BACKEND LOGIC ---
          if ! yq -e '.containers and (.containers | length > 0)' "$FULL_PATH" > /dev/null; then
            echo "ERROR: .containers missing or empty in $FULL_PATH"
            exit 1
          fi

          echo "Updating ALL containers[].image.tag to ${IMAGE_TAG}"
          yq -i '(.containers[].image.tag) = strenv(IMAGE_TAG)' "$FULL_PATH"
          echo "Updated tags:"
          yq -r '.containers[].image.tag' "$FULL_PATH"

      - name: Commit and push
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          cd gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git add .
          git commit -m "chore(${SERVICE}): bump ${ENVIRONMENT} image tags to ${IMAGE_TAG}"
          git push
